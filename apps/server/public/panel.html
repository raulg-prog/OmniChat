<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OmniChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #1c1a17; --surface: #25221f; --surface-2: #2e2a26; --line: #3a352e; --line-2: #49433a;
    --text: #ece7df; --muted: #9c958a; --accent: #d97757;
    --twitch: #a970ff; --kick: #53fc18; --youtube: #ff4d4d; --x: #e7e9ea;
    --font: "Inter", system-ui, -apple-system, Segoe UI, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { display: flex; flex-direction: column; background: var(--bg); color: var(--text);
    font-family: var(--font); font-size: 14px; -webkit-font-smoothing: antialiased; }

  /* header */
  header { flex: none; display: flex; align-items: center; justify-content: space-between; gap: 20px;
    padding: 15px 22px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .logo { display: inline-flex; gap: 3px; padding: 7px 8px; border-radius: 9px;
    background: var(--surface-2); border: 1px solid var(--line); }
  .logo i { width: 4px; height: 17px; border-radius: 2px; display: block; }
  .logo i:nth-child(1) { background: var(--twitch); }
  .logo i:nth-child(2) { background: var(--kick); }
  .logo i:nth-child(3) { background: var(--x); }
  .logo i:nth-child(4) { background: var(--youtube); }
  .brand h1 { font-size: 19px; font-weight: 700; letter-spacing: -.01em; margin: 0; line-height: 1; }
  .brand .sub { display: block; font-size: 11px; color: var(--muted); letter-spacing: .03em; margin-top: 3px; }
  .hstat { display: flex; align-items: center; gap: 10px; }
  .onair { display: inline-flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 600;
    color: var(--muted); padding: 7px 14px; border: 1px solid var(--line); border-radius: 999px;
    text-transform: uppercase; letter-spacing: .07em; }
  .onair.live { color: var(--accent); border-color: rgba(217,119,87,.34); }
  .onair .led { width: 8px; height: 8px; border-radius: 50%; background: #3a3f47; }
  .onair.live .led { background: var(--accent); box-shadow: 0 0 9px var(--accent); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(217,119,87,.5)} 70%{box-shadow:0 0 0 6px rgba(217,119,87,0)} 100%{box-shadow:0 0 0 0 rgba(217,119,87,0)} }
  .vtotal { display: inline-flex; align-items: baseline; gap: 6px; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em; padding: 7px 14px; border: 1px solid var(--line); border-radius: 999px; }
  .vtotal .vnum { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: 0; }

  /* tabs */
  .tabs { flex: none; display: flex; justify-content: center; gap: 2px; padding: 0 14px; border-bottom: 1px solid var(--line); }
  .tab { appearance: none; background: none; border: none; color: var(--muted); font-family: var(--font);
    font-size: 15px; font-weight: 500; padding: 13px 16px; cursor: pointer; position: relative; transition: color .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); font-weight: 600; }
  .tab.active::after { content: ""; position: absolute; left: 14px; right: 14px; bottom: -1px; height: 2px;
    background: var(--accent); border-radius: 2px; }

  /* views */
  main { flex: 1; min-height: 0; }
  .view { height: 100%; overflow: auto; }
  .view[hidden] { display: none; }
  .pad { padding: 20px 22px; max-width: 860px; margin: 0 auto; }

  /* chat feed */
  .chatlayout { display: flex; height: 100%; }
  .pfilter { flex: none; width: 196px; padding: 14px 12px; border-right: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
  .pf { display: flex; align-items: center; gap: 9px; font: inherit; font-size: 13px; color: var(--muted);
    background: none; border: 1px solid transparent; border-radius: 9px; padding: 9px 11px; cursor: pointer; text-align: left; transition: .12s; }
  .pf:hover { background: var(--surface); color: var(--text); }
  .pf.on { background: var(--surface); color: var(--text); border-color: var(--line-2); }
  .pf svg { width: 16px; height: 16px; flex: none; }
  .pf.p-twitch svg { fill: var(--twitch); } .pf.p-kick svg { fill: var(--kick); } .pf.p-youtube svg { fill: var(--youtube); } .pf.p-x svg { fill: var(--x); }
  .pf .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex: none; }
  .pf .nm { flex: 1; }
  .pf b { font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }
  .feed { flex: 1; min-width: 0; height: 100%; overflow-y: auto; padding: 10px 0 16px; }
  .feed.filter-twitch .msg:not(.p-twitch),
  .feed.filter-kick .msg:not(.p-kick),
  .feed.filter-x .msg:not(.p-x),
  .feed.filter-youtube .msg:not(.p-youtube) { display: none; }
  .feed::-webkit-scrollbar { width: 10px; }
  .feed::-webkit-scrollbar-thumb { background: #3a352e; border-radius: 6px; border: 3px solid var(--bg); }
  .msg { position: relative; max-width: 860px; margin: 0 auto; padding: 8px 22px; line-height: 1.55; font-size: var(--feed-fs, 14.5px); animation: in .16s ease-out; }
  .msg:hover { background: rgba(255,255,255,.025); }
  @keyframes in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .src { display: inline-flex; align-items: center; vertical-align: middle; flex: none; gap: 7px;
    font-size: .92em; line-height: 1; margin-right: 10px; }
  .src .plat { font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
  .src .plat svg { width: 1.15em; height: 1.15em; fill: currentColor; }
  .src .plat.twitch { color: var(--twitch); } .src .plat.kick { color: var(--kick); } .src .plat.youtube { color: var(--youtube); } .src .plat.x { color: var(--x); }
  .src .rep { font-size: .72em; font-weight: 600; letter-spacing: .04em; color: var(--muted); margin-left: 6px; }
  .msg .meta { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); display: none;
    align-items: center; gap: 7px; font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums;
    background: var(--surface-2); border: 1px solid var(--line-2); border-radius: 7px; padding: 4px 10px;
    white-space: nowrap; box-shadow: 0 6px 18px rgba(0,0,0,.4); pointer-events: none; }
  .msg:hover .meta { display: inline-flex; }
  .msg .meta i { color: var(--line-2); font-style: normal; }
  .msg .meta b { font-weight: 600; }
  .msg .meta .m-yes { color: #6fc27a; }
  .msg .meta .m-no { color: var(--muted); }
  .msg .meta .m-rep { color: var(--accent); }
  .msg .user { font-weight: 700; margin-right: 8px; }
  .msg .body { color: #d8d2c7; word-break: break-word; }
  .emote { height: 1.5em; vertical-align: middle; margin: -.3em 0; }
  .bdg { display: inline-flex; vertical-align: middle; margin-right: 3px; }
  .bdg svg { width: 1.05em; height: 1.05em; fill: currentColor; }
  .feed .empty { color: var(--muted); padding: 40px 22px; }

  /* resources: add + stream cards + obs */
  .addrow { display: flex; gap: 10px; margin-bottom: 14px; }
  .addrow input { flex: 1; font: inherit; font-size: 14px; color: var(--text); background: var(--surface);
    border: 1px solid var(--line); border-radius: 10px; padding: 12px 15px; transition: .15s; }
  .addrow input:focus { outline: none; border-color: var(--line-2); box-shadow: 0 0 0 3px rgba(255,255,255,.045); }
  button.primary { font: inherit; font-weight: 600; font-size: 14px; background: var(--accent); color: #2a1206;
    border: none; border-radius: 10px; padding: 0 20px; cursor: pointer; transition: .15s; }
  button.primary:hover { filter: brightness(1.07); }
  .err { color: #ff6b6b; font-size: 13px; min-height: 18px; margin-bottom: 8px; }
  .chan { display: flex; align-items: center; gap: 14px; padding: 13px 15px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 12px; margin-bottom: 9px; transition: border-color .15s; }
  .chan:hover { border-color: var(--line-2); }
  .chip { display: inline-flex; align-items: center; gap: 6px; flex: none; min-width: 92px; font-size: 12px;
    font-weight: 700; padding: 5px 11px; border-radius: 8px; color: #07080a; }
  .chip svg { width: 1.05em; height: 1.05em; fill: currentColor; }
  .chip.twitch { background: var(--twitch); color: #fff; } .chip.kick { background: var(--kick); } .chip.youtube { background: var(--youtube); color: #fff; } .chip.x { background: var(--x); color: #0a0a0a; }
  .chan .who { flex: 1; min-width: 0; }
  .chan .who .name { font-weight: 600; }
  .chan .who .stat { display: block; font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .chan .who .stat.live { color: var(--accent); }
  .chan .vcount { font-variant-numeric: tabular-nums; font-size: 13px; color: var(--text); flex: none; min-width: 56px; text-align: right; }
  .chan .vcount::after { content: " 👁"; font-size: 11px; opacity: .55; }
  .chan .vcount.off { color: var(--muted); }
  .chan .rm { font: inherit; font-size: 12px; font-weight: 500; color: var(--muted); background: none;
    border: 1px solid var(--line); border-radius: 8px; padding: 7px 12px; cursor: pointer; transition: .15s; }
  .chan .rm:hover { color: #ff6b6b; border-color: rgba(255,107,107,.35); }
  .empty { color: var(--muted); font-size: 13px; padding: 26px 0; text-align: center; border: 1px dashed var(--line); border-radius: 12px; }
  .obsrow { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-top: 18px;
    padding: 14px 16px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; }
  .obsrow .obslabel { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin: 0 0 6px; }
  .obsrow .url { font-size: 13px; color: var(--text); user-select: all; }
  .obsrow button { font: inherit; font-weight: 600; font-size: 13px; color: var(--text); background: var(--surface-2);
    border: 1px solid var(--line-2); border-radius: 9px; padding: 9px 16px; cursor: pointer; flex: none; }
  .obsrow button:hover { border-color: var(--accent); color: var(--accent); }

  /* appearance settings */
  .field { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 15px 2px; border-bottom: 1px solid var(--line); }
  .field:last-child { border-bottom: 0; }
  .field .k { font-size: 14px; }
  .field input[type=range] { accent-color: var(--accent); width: 180px; }
  .field select { font: inherit; font-size: 13px; background: var(--surface); color: var(--text);
    border: 1px solid var(--line); border-radius: 9px; padding: 9px 12px; }
  .field select:focus { outline: none; border-color: var(--line-2); }
  .toggles { display: flex; gap: 8px; }
  .tog { font-size: 12px; font-weight: 600; padding: 8px 13px; border-radius: 9px; border: 1px solid var(--line);
    cursor: pointer; color: var(--muted); transition: .12s; }
  .tog:hover { color: var(--text); }
  .tog.twitch.on { background: var(--twitch); color: #fff; border-color: var(--twitch); }
  .tog.kick.on { background: var(--kick); color: #07140a; border-color: var(--kick); }
  .tog.youtube.on { background: var(--youtube); color: #fff; border-color: var(--youtube); }
  .tog.x.on { background: var(--x); color: #0a0a0a; border-color: var(--x); }
  .val { font-size: 13px; color: var(--accent); min-width: 46px; text-align: right; font-variant-numeric: tabular-nums; }
</style>

<header>
  <div class="brand">
    <span class="logo" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
    <div><h1>OmniChat</h1><span class="sub">Twitch · Kick · X · YouTube</span></div>
  </div>
  <div class="hstat">
    <div class="onair" id="onair"><span class="led"></span><span id="onairtxt">Standby</span></div>
    <div class="vtotal" id="vtotal" title="Combined live viewers"><span class="vnum" id="vnum">—</span><span>viewers</span></div>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button class="tab active" data-tab="chat">Chat</button>
  <button class="tab" data-tab="resources">Resources</button>
  <button class="tab" data-tab="appearance">Appearance</button>
</nav>

<main>
  <section class="view" data-view="chat">
    <div class="chatlayout">
      <aside class="pfilter" id="pfilter"></aside>
      <div class="feed" id="feed"></div>
    </div>
  </section>

  <section class="view" data-view="resources" hidden>
    <div class="pad">
      <div class="addrow">
        <input id="url" placeholder="Paste a Twitch, Kick, X, or YouTube stream URL…" autocomplete="off" />
        <button class="primary" id="add">Add</button>
      </div>
      <div class="err" id="err"></div>
      <div id="channels"></div>
      <div class="obsrow">
        <div><p class="obslabel">OBS Browser Source URL</p><span class="url" id="obsurl">…</span></div>
        <button id="copy">Copy</button>
      </div>
    </div>
  </section>

  <section class="view" data-view="appearance" hidden>
    <div class="pad">
      <div class="field">
        <span class="k">Show platforms</span>
        <div class="toggles" id="toggles">
          <span class="tog twitch" data-p="twitch">Twitch</span>
          <span class="tog kick" data-p="kick">Kick</span>
          <span class="tog x" data-p="x">X</span>
          <span class="tog youtube" data-p="youtube">YouTube</span>
        </div>
      </div>
      <div class="field">
        <span class="k">Overlay theme</span>
        <select id="theme">
          <option value="transparent">Transparent (recommended)</option>
          <option value="dark">Solid dark</option>
          <option value="light">Light</option>
        </select>
      </div>
      <div class="field"><span class="k">Font size</span><span><input type="range" id="fontSize" min="12" max="40" /> <span class="val" id="fontSizeV"></span></span></div>
      <div class="field"><span class="k">Max messages</span><span><input type="range" id="maxMessages" min="3" max="30" /> <span class="val" id="maxMessagesV"></span></span></div>
      <div class="field"><span class="k">Fade after (0 = keep)</span><span><input type="range" id="fadeSeconds" min="0" max="60" /> <span class="val" id="fadeSecondsV"></span></span></div>
      <div class="field"><span class="k">Slow chat</span><span><input type="range" id="slowMs" min="0" max="2000" step="100" /> <span class="val" id="slowMsV"></span></span></div>
    </div>
  </section>
</main>

<script>
  const $ = (id) => document.getElementById(id);
  const LABEL = { twitch: "Twitch", kick: "Kick", youtube: "YouTube", x: "X" };
  const NAMECOLOR = { twitch: "#bf94ff", kick: "#53fc18", youtube: "#ff7a7a", x: "#e7e9ea" };
  const ICON = {
    twitch: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>`,
    youtube: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`,
    kick: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M1.333 0h8v5.333H12V2.667h2.667V0h8v8H20v2.667h-2.667v2.666H20V16h2.667v8h-8v-2.667H12v-2.666H9.333V24h-8Z"/></svg>`,
    x: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg>`,
  };
  // chat badges -> small tinted icons (mod/sub/vip/broadcaster/verified/member)
  const BADGE = (() => {
    const crown = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 17h18v3H3zM3 6l4.5 4L12 4l4.5 6L21 6l-1.6 9H4.6z"/></svg>`;
    const shield = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 4 5.3V11c0 5 3.4 9.4 8 10.7 4.6-1.3 8-5.7 8-10.7V5.3z"/></svg>`;
    const diamond = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5.5 3h13l3.5 6-10 12.5L2 9z"/></svg>`;
    const star = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.5l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.8 6.2 20.9l1.1-6.5L2.6 9.3l6.5-.9z"/></svg>`;
    const check = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm4.7 7.3-6 6-2.7-2.7 1.4-1.4 1.3 1.3 4.6-4.6z"/></svg>`;
    return {
      broadcaster: { c: "#ff5a5a", s: crown }, moderator: { c: "#56d364", s: shield },
      vip: { c: "#ff67d0", s: diamond }, subscriber: { c: "#ffb13d", s: star },
      founder: { c: "#ffd23d", s: star }, member: { c: "#2ba640", s: star },
      verified: { c: "#3ea6ff", s: check }, partner: { c: "#3ea6ff", s: check },
    };
  })();
  const esc = (s) => String(s).replace(/[<>&]/g, (c) => ({ "<":"&lt;", ">":"&gt;", "&":"&amp;" }[c]));
  const escAttr = (s) => String(s).replace(/[<>&"]/g, (c) => ({ "<":"&lt;", ">":"&gt;", "&":"&amp;", '"':"&quot;" }[c]));
  function body(m) {
    if (Array.isArray(m.fragments) && m.fragments.length) {
      return m.fragments.map((f) =>
        f.type === "emote" && /^https:\/\//.test(f.url || "")
          ? `<img class="emote" src="${escAttr(f.url)}" alt="${escAttr(f.name)}" title="${escAttr(f.name)}" loading="lazy">`
          : esc(f.text || "")).join("");
    }
    return esc(m.text);
  }
  const obsUrl = `${location.protocol}//${location.host}/`;
  $("obsurl").textContent = obsUrl;

  let channels = [];
  let settings = null;
  const lastSeen = {};   // `${platform}:${channel}` -> ts (live status)
  const viewers = {};    // channel id -> live viewer count | null

  // ---- tabs ----
  $("tabs").addEventListener("click", (e) => {
    const t = e.target.closest(".tab"); if (!t) return;
    document.querySelectorAll(".tab").forEach((b) => b.classList.toggle("active", b === t));
    document.querySelectorAll(".view").forEach((v) => (v.hidden = v.dataset.view !== t.dataset.tab));
  });

  // ---- OBS url copy ----
  $("copy").onclick = async () => {
    try { await navigator.clipboard.writeText(obsUrl); $("copy").textContent = "Copied"; }
    catch { $("copy").textContent = "Select & Copy"; }
    setTimeout(() => ($("copy").textContent = "Copy"), 1400);
  };

  // ---- add / remove ----
  async function addChannel() {
    const url = $("url").value.trim(); $("err").textContent = "";
    if (!url) return;
    const r = await fetch("/api/channels", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ url }) });
    const data = await r.json();
    if (!r.ok) { $("err").textContent = data.error || "Couldn't add that."; return; }
    $("url").value = "";
  }
  $("add").onclick = addChannel;
  $("url").addEventListener("keydown", (e) => { if (e.key === "Enter") addChannel(); });
  async function removeChannel(id) { await fetch(`/api/channels/${id}`, { method: "DELETE" }); }

  // ---- streams list (Resources) + viewer totals ----
  function isLive(c) { const t = lastSeen[`${c.platform}:${c.channel}`]; return t && Date.now() - t < 30000; }
  function fmtViewers(n) { return typeof n === "number" ? n.toLocaleString() : "—"; }
  function renderTotal() {
    const nums = channels.map((c) => viewers[c.id]).filter((n) => typeof n === "number");
    $("vnum").textContent = nums.length ? nums.reduce((s, n) => s + n, 0).toLocaleString() : "—";
  }
  function renderChannels() {
    const el = $("channels");
    if (!channels.length) { el.innerHTML = `<div class="empty">No streams yet. Paste a URL above to start.</div>`; renderTotal(); return; }
    el.innerHTML = channels.map((c) => {
      const live = isLive(c);
      return `<div class="chan">
        <span class="chip ${c.platform}">${ICON[c.platform] || ""}${LABEL[c.platform] || c.platform}</span>
        <span class="who"><span class="name">${esc(c.channel)}</span>
          <span class="stat ${c.platform === "x" ? "" : live ? "live" : ""}">${c.platform === "x" ? "Replay · sample chat" : live ? "Live · receiving" : "Waiting for messages"}</span></span>
        <span class="vcount ${typeof viewers[c.id] === "number" ? "" : "off"}">${fmtViewers(viewers[c.id])}</span>
        <button class="rm" data-id="${c.id}">Remove</button>
      </div>`;
    }).join("");
    el.querySelectorAll(".rm").forEach((b) => (b.onclick = () => removeChannel(b.dataset.id)));
    const anyLive = channels.some(isLive);
    $("onair").classList.toggle("live", anyLive);
    $("onairtxt").textContent = anyLive ? "On Air" : "Standby";
    renderTotal();
  }

  // ---- chat feed (Chat tab) ----
  const feed = $("feed");
  feed.innerHTML = `<div class="empty">Waiting for chat… add streams in the Resources tab.</div>`;

  // platform filter sidebar: per-platform viewer totals; click a platform to show only its chat
  let filter = null;
  function platformTotals() {
    const t = { twitch:{has:false,sum:0,num:false}, kick:{has:false,sum:0,num:false}, x:{has:false,sum:0,num:false}, youtube:{has:false,sum:0,num:false} };
    for (const c of channels) { const p = t[c.platform]; if (!p) continue; p.has = true; const v = viewers[c.id]; if (typeof v === "number") { p.sum += v; p.num = true; } }
    return t;
  }
  function renderFilters() {
    const t = platformTotals();
    const plats = ["twitch","kick","x","youtube"].filter((p) => t[p].has);
    const allSum = plats.reduce((s,p) => s + t[p].sum, 0), allNum = plats.some((p) => t[p].num);
    let html = `<button class="pf ${filter===null?"on":""}" data-p=""><span class="dot"></span><span class="nm">All</span><b>${allNum?allSum.toLocaleString():"—"}</b></button>`;
    for (const p of plats) html += `<button class="pf p-${p} ${filter===p?"on":""}" data-p="${p}">${ICON[p]}<span class="nm">${LABEL[p]}</span><b>${t[p].num?t[p].sum.toLocaleString():"—"}</b></button>`;
    $("pfilter").innerHTML = html;
    $("pfilter").querySelectorAll(".pf").forEach((b) => (b.onclick = () => setFilter(b.dataset.p || null)));
  }
  function setFilter(p) {
    filter = p;
    feed.classList.remove("filter-twitch","filter-kick","filter-x","filter-youtube");
    if (p) feed.classList.add("filter-" + p);
    renderFilters();
  }
  function addMsg(m) {
    if (settings && settings.showPlatform && settings.showPlatform[m.platform] === false) return;
    const first = feed.querySelector(".empty"); if (first) first.remove();
    const nearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 90;
    const row = document.createElement("div");
    row.className = "msg p-" + m.platform;
    const badges = (m.author.badges || []).map((b) => { const d = BADGE[b.type]; return d ? `<span class="bdg" style="color:${d.c}" title="${escAttr(b.label || b.type)}">${d.s}</span>` : ""; }).join("");
    const subbed = (m.author.badges || []).some((b) => b.type === "subscriber" || b.type === "founder" || b.type === "member");
    const time = new Date(m.timestamp || Date.now()).toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" });
    const status = m.platform === "x" ? `<b class="m-rep">replay</b>`
      : subbed ? `<b class="m-yes">Subscriber</b>` : `<b class="m-no">Not subscribed</b>`;
    row.innerHTML =
      `<span class="src"><span class="plat ${m.platform}">${ICON[m.platform] || ""}</span>${m.platform === "x" ? '<span class="rep">replay</span>' : ""}</span>` +
      badges +
      `<span class="user" style="color:${m.author.color || NAMECOLOR[m.platform] || "#cbb6ff"}">${esc(m.author.name)}</span>` +
      `<span class="body">${body(m)}</span>` +
      `<span class="meta">${time}<i>·</i>${LABEL[m.platform] || m.platform} ${esc(m.channel)}<i>·</i>${status}</span>`;
    feed.appendChild(row);
    while (feed.childElementCount > 200) feed.removeChild(feed.firstChild);
    if (nearBottom) feed.scrollTop = feed.scrollHeight;
  }

  // ---- slow chat: paced release. Renders immediately when idle; spaces out a busy chat ----
  let mq = [], pacing = false, lastShown = 0;
  function pump() {
    if (!mq.length) { pacing = false; return; }
    addMsg(mq.shift());
    lastShown = Date.now();
    setTimeout(pump, Math.max(60, (settings && settings.slowMs) || 60));
  }
  function feedMsg(m) {
    lastSeen[`${m.platform}:${m.channel}`] = Date.now(); // real-time receipt for live status
    const slow = (settings && settings.slowMs) || 0;
    if (!slow) { addMsg(m); return; }
    mq.push(m);
    if (mq.length > 60) mq.shift(); // cap backlog so it stays near real-time
    if (!pacing) { pacing = true; setTimeout(pump, Math.max(0, slow - (Date.now() - lastShown))); }
  }

  // ---- settings (Appearance) ----
  function settingLabel(k, v) {
    if (k === "slowMs") return Number(v) === 0 ? "Off" : v + "ms";
    return v + (k === "fontSize" ? "px" : k === "fadeSeconds" ? "s" : "");
  }
  function bindSettings() {
    function push(patch) { fetch("/api/settings", { method: "PUT", headers: { "content-type": "application/json" }, body: JSON.stringify(patch) }); }
    $("theme").onchange = (e) => push({ theme: e.target.value });
    [["fontSize"], ["maxMessages"], ["fadeSeconds"], ["slowMs"]].forEach(([k]) => {
      $(k).oninput = (e) => { $(k + "V").textContent = settingLabel(k, e.target.value); };
      $(k).onchange = (e) => push({ [k]: Number(e.target.value) });
    });
    $("toggles").querySelectorAll(".tog").forEach((t) => {
      t.onclick = () => push({ showPlatform: { [t.dataset.p]: !(settings.showPlatform[t.dataset.p]) } });
    });
  }
  function reflectSettings() {
    if (!settings) return;
    // font size also drives the live chat feed (scaled to its design size; default unchanged)
    document.documentElement.style.setProperty("--feed-fs", (settings.fontSize * 0.725).toFixed(1) + "px");
    $("theme").value = settings.theme;
    for (const k of ["fontSize", "maxMessages", "fadeSeconds", "slowMs"]) {
      $(k).value = settings[k]; $(k + "V").textContent = settingLabel(k, settings[k]);
    }
    $("toggles").querySelectorAll(".tog").forEach((t) => t.classList.toggle("on", settings.showPlatform[t.dataset.p] !== false));
  }

  // ---- live connection ----
  function connect() {
    const ws = new WebSocket(`ws://${location.host}`);
    ws.onmessage = (e) => {
      const d = JSON.parse(e.data);
      if (d.channels) { channels = d.channels; renderChannels(); renderFilters(); }
      if (d.settings) { settings = d.settings; reflectSettings(); }
      if (d.kind === "message") { feedMsg(d.message); renderChannels(); }
      if (d.kind === "viewers") { for (const c of d.counts) viewers[c.id] = c.viewers; renderChannels(); renderFilters(); }
    };
    ws.onclose = () => setTimeout(connect, 1000);
  }

  (async function init() {
    const s = await (await fetch("/api/state")).json();
    channels = s.channels; settings = s.settings;
    bindSettings(); reflectSettings(); renderChannels(); renderFilters();
    connect();
    setInterval(renderChannels, 5000);
  })();
</script>
